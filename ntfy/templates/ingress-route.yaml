{{- $ingressRoute := .Values.ingressRoute -}}
{{- if $ingressRoute.enabled }}
{{- $ntfyContainer := .Values.containers.ntfy -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "ntfy.fullname" . }}-ir
  namespace: {{ .Release.Namespace | quote }}
spec:
  entryPoints:
    {{- toYaml $ingressRoute.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ .Values.ingressRoute.host }}`)
      kind: Rule
      services:
        - name: {{ include "ntfy.fullname" . }}-service
          port: {{ index $ntfyContainer.service.ports 0 "port" }}
          scheme: http
  tls:
    certResolver: {{ .Values.ingressRoute.certResolver }}
{{- end }}
