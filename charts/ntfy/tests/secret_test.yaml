#------------------------------------------------------------------------------
#
# Secret-Unittests Test-Suite for NTFY
#
# > https://github.com/helm-unittest/helm-unittest/blob/main/DOCUMENT.md
# 
#------------------------------------------------------------------------------
#
# Test suite name to show on test result output
suite: Test Secret
#
# The template files scope to test in this suite
# Only the selected files will be rendered
templates:
  - templates/secret.yaml
#
tests:
  - it: should pass without existingSecretNames
    #
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.auth-tokens
          value: "test-user:tk_84t6qy4qxadevc37jbqty4q8xlpzl:Test-Token for Test-User"
      - equal:
          path: stringData.auth-users
          value: "test-admin:$2a$10$1Y//CVdFIQRYNfIITwqZDeqnh0bFSM/Bhxjis5gKItcgU0UrSNWAa:admin,test-user:$2a$10$1Y//CVdFIQRYNfIITwqZDeqnh0bFSM/Bhxjis5gKItcgU0UrSNWAa:user"
      - equal:
          path: stringData.auth-access
          value: "test-user:TestTopic:rw"