{{ include "librefrontier.validateValues" . }}
{{- $APIingressRoute := .Values.APIingressRoute -}}
{{- $webUIingressRoute := .Values.webUIingressRoute -}}
{{- $librefrontierContainer := .Values.containers.librefrontier -}}
{{- if $webUIingressRoute.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "librefrontier.fullname" . }}-webui
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "librefrontier.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml $webUIingressRoute.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ $webUIingressRoute.host }}`)
      kind: Rule
      services:
        - name: {{ include "librefrontier.fullname" . }}
          port: {{ index $librefrontierContainer.service.ports 1 "port" }}
          scheme: http
  tls:
    certResolver: {{ $webUIingressRoute.certResolver }}
{{- end }}
{{- if $APIingressRoute.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "librefrontier.fullname" . }}-api
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "librefrontier.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- toYaml $APIingressRoute.entryPoints | nindent 4 }}
  routes:
    - match: Host(`{{ $APIingressRoute.host }}`)
      kind: Rule
      services:
        - name: {{ include "librefrontier.fullname" . }}
          port: {{ index $librefrontierContainer.service.ports 0 "port" }}
          scheme: http
{{- end -}}
