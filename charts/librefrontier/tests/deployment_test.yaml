#------------------------------------------------------------------------------
#
# Deployment-Unittests Test-Suite for Librefrontier
#
# > https://github.com/helm-unittest/helm-unittest/blob/main/DOCUMENT.md
# 
#------------------------------------------------------------------------------
#
# Test suite name to show on test result output
suite: Test Deployment
#
# The template files scope to test in this suite
# Only the selected files will be rendered
templates:
  - templates/deployment.yaml
  #
  # following are required to calculate their checksum
  - templates/service.yaml
  - templates/ingress-route.yaml
#
tests:
  - it: should render with enabled API-IngressRoute-Resource
    #
    template: templates/deployment.yaml
    #
    set:
      APIingressRoute.enabled: true
    #
    asserts:
      - isKind:
          of: Deployment
      - exists:
          path: spec.template.metadata.annotations["checksum/ingress-route"]
  
  - it: should render with enabled Web-UI-IngressRoute-Resource
    #
    template: templates/deployment.yaml
    #
    set:
      webUIingressRoute.enabled: true
    #
    asserts:
      - isKind:
          of: Deployment
      - exists:
          path: spec.template.metadata.annotations["checksum/ingress-route"]
  
  - it: should render without any IngressRoute-Resource
    #
    template: templates/deployment.yaml
    #
    set:
      APIingressRoute.enabled: false
    #
    asserts:
      - isKind:
          of: Deployment
      - notExists:
          path: spec.template.metadata.annotations["checksum/ingress-route"]