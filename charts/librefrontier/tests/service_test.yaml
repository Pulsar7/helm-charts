#------------------------------------------------------------------------------
#
# Service-Unittests Test-Suite for Librefrontier
#
# > https://github.com/helm-unittest/helm-unittest/blob/main/DOCUMENT.md
# 
#------------------------------------------------------------------------------
#
# Test suite name to show on test result output
suite: Test Service
#
# The template files scope to test in this suite
# Only the selected files will be rendered
templates:
  - templates/service.yaml
#
tests:
  - it: should render with NodePort as http-API-Service type and specific ports
    #
    documentIndex: 0
    #
    set:
      containers:
        librefrontier:
          services:
            httpAPI:
              type: NodePort
              port: 7331
              nodePort: 18181
    #
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].port
          value: 7331
      - equal:
          path: spec.ports[0].nodePort
          value: 18181

  - it: should render with NodePort as web-UI-Service type and specific ports
    #
    documentIndex: 1
    #
    set:
      containers:
        librefrontier:
          services:
            webUI:
              enabled: true
              type: NodePort
              port: 7331
              nodePort: 18181
    #
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].port
          value: 7331
      - equal:
          path: spec.ports[0].nodePort
          value: 18181

