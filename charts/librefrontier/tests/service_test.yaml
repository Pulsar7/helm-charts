#------------------------------------------------------------------------------
#
# Service-Unittests Test-Suite for Librefrontier
#
# > https://github.com/helm-unittest/helm-unittest/blob/main/DOCUMENT.md
# 
#------------------------------------------------------------------------------
#
# Test suite name to show on test result output
suite: Test Service
#
# The template files scope to test in this suite
# Only the selected files will be rendered
templates:
  - templates/service.yaml
#
tests:
  - it: should render with different service-type and port
    #
    set:
      containers.librefrontier.service.type: NodePort
      values: |
      containers:
        librefrontier:
          service:
            ports:
              - name: http-api
                containerPort: 80
                port: 1337
                targetPort: http-api
                protocol: TCP
              - name: web-ui
                containerPort: 8080
                port: 1338
                targetPort: web-ui
                protocol: TCP
    #
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].port
          value: 1337
      - equal:
          path: spec.ports[1].port
          value: 1338