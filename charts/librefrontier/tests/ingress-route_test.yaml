#------------------------------------------------------------------------------
#
# IngressRoute-Unittests Test-Suite for Librefrontier
#
# > https://github.com/helm-unittest/helm-unittest/blob/main/DOCUMENT.md
# 
#------------------------------------------------------------------------------
#
# Test suite name to show on test result output
suite: Test IngressRoute
#
# The template files scope to test in this suite
# Only the selected files will be rendered
templates:
  - templates/ingress-route.yaml
#
tests:
  - it: should render only with enabled and configured Web-UI-IngressRoute
    #
    #documentIndex: 0
    #
    set:
      webUIingressRoute.enabled: true
      webUIingressRoute.entryPoints: ["test-web-ui-entrypoint"]
      webUIingressRoute.certResolver: "test-cert-resolver"
      webUIingressRoute.host: "web-ui-test-host"
    #
    asserts:
      - isKind:
          of: IngressRoute
      - contains:
          path: spec.entryPoints
          content: "test-web-ui-entrypoint"
      - contains:
          path: spec.routes
          content:
            match: Host(`web-ui-test-host`)
            kind: Rule
            services:
              - name: RELEASE-NAME-librefrontier
                port: 8080
                scheme: http
      - equal:
          path: spec.tls.certResolver
          value: "test-cert-resolver"

  - it: should render only with enabled and configured API-IngressRoute
    #
    set:
      APIingressRoute.enabled: true
      APIingressRoute.entryPoints: ["test-api-entrypoint"]
      APIingressRoute.host: "api-test-host"
    #
    asserts:
      - isKind:
          of: IngressRoute
      - contains:
          path: spec.entryPoints
          content: "test-api-entrypoint"
      - contains:
          path: spec.routes
          content:
            match: Host(`api-test-host`)
            kind: Rule
            services:
              - name: RELEASE-NAME-librefrontier
                port: 80
                scheme: http
  
  - it: should render with disabled IngressRoute-Resources
    #
    set:
      APIingressRoute.enabled: false
      webUIingressRoute.enabled: false
    #
    asserts:
      - notExists:
          path: spec